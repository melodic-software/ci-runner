# LEGACY MIGRATION EVIDENCE ONLY. DO NOT DEPLOY OR USE THIS FILE TO BOOTSTRAP
# CREDENTIALS. The production controller imports a source PEM through
# `ci-runner secret import`, writes and ACL-hardens its current-user DPAPI
# destination, verifies it by readback, then removes the named plaintext source
# before reporting success.
#
# The former fleet registered one JIT runner per container and used
# `restart: always` as its lifecycle. It passed a reusable App private key in
# the container environment through a host-local .env. These files remain only
# until live cutover proof permits their deletion.
services:
  runner:
    image: ghcr.io/melodic-software/ci-runner:latest
    pull_policy: always
    restart: always
    # `scale` (not deploy.replicas): the service-level attribute the Compose
    # file reference defines for the default container count, honored by
    # standalone `docker compose up`.
    scale: ${RUNNER_REPLICAS:-2}
    environment:
      APP_CLIENT_ID: ${APP_CLIENT_ID:?set in .env}
      APP_PRIVATE_KEY_B64: ${APP_PRIVATE_KEY_B64:?set in .env}
      ORG: ${ORG:-melodic-software}
      RUNNER_GROUP: ${RUNNER_GROUP:-self-hosted}
      RUNNER_LABELS: ${RUNNER_LABELS:-self-hosted-medley}
