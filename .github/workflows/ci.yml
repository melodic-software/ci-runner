name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '30 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint Markdown
        uses: melodic-software/ci-workflows/.github/actions/markdown@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          config: .markdownlint-cli2.jsonc

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint shell
        uses: melodic-software/ci-workflows/.github/actions/shellcheck@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          rcfile: .shellcheckrc

  shfmt:
    name: Shell format
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check shell formatting
        uses: melodic-software/ci-workflows/.github/actions/shfmt@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0

  typos:
    name: Spelling
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check spelling
        uses: melodic-software/ci-workflows/.github/actions/typos@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          config: _typos.toml

  editorconfig:
    name: EditorConfig
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check EditorConfig conformance
        uses: melodic-software/ci-workflows/.github/actions/editorconfig@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          config: .editorconfig-checker.json

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan for secrets
        uses: melodic-software/ci-workflows/.github/actions/gitleaks@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          config: .gitleaks.toml

  lychee:
    name: Offline links
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check local links and anchors
        uses: melodic-software/ci-workflows/.github/actions/lychee-offline@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          config: lychee.toml

  comment-hygiene:
    name: Comment hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan comment hygiene
        uses: melodic-software/ci-workflows/.github/actions/comment-hygiene@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0

  actionlint:
    name: Actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: melodic-software/ci-workflows/.github/actions/actionlint@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0

  jsonschema:
    name: JSON schemas
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate Dependabot configuration
        uses: melodic-software/ci-workflows/.github/actions/check-jsonschema@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          builtin-schema: vendor.dependabot
          files: .github/dependabot.yml
      - name: Validate workflows
        uses: melodic-software/ci-workflows/.github/actions/check-jsonschema@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          builtin-schema: vendor.github-workflows
          files: .github/workflows/*.yml

  exec-bit:
    name: Executable bits
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check executable bits
        uses: melodic-software/ci-workflows/.github/actions/exec-bit@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0

  machine-specific-paths:
    name: Machine-specific paths
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check machine-specific paths
        uses: melodic-software/ci-workflows/.github/actions/machine-specific-paths@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
        with:
          # These files assert the official image's fixed in-container runner
          # home. They contain no host/user path; keep the exception exact.
          exclude: >-
            :(exclude)docs/worker-image.md
            :(exclude)scripts/Test-ReleasePins.ps1
            :(exclude)scripts/verify-worker-image.sh
            :(exclude)worker/capture-cgroup.sh
            :(exclude)worker/entrypoint.sh
            :(exclude)worker/set-state.sh

  eol-renormalize:
    name: EOL normalization
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check index-level EOL drift
        uses: melodic-software/ci-workflows/.github/actions/eol-renormalize@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0

  zizmor:
    name: Zizmor
    permissions:
      contents: read # Reusable advisory audit reads the checked-in workflow graph.
    uses: melodic-software/ci-workflows/.github/workflows/zizmor.yml@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
    with:
      paths: .

  policy:
    name: Product policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Test queue monitor and resumable release transaction
        run: node --test .github/scripts/*.test.cjs
      - name: Verify immutable dependency and publication contracts
        shell: pwsh
        run: ./scripts/Test-ReleasePins.ps1

  go-quality:
    permissions:
      contents: read
    uses: melodic-software/ci-workflows/.github/workflows/go-quality.yml@9eb22acf1a9235c352779325d24615b7b492d44d # v0.3.0
    with:
      config: .golangci.yml

  go-windows-build:
    name: Go Windows builds
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Compile Windows executables
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -trimpath -o /tmp/ci-runner.exe ./cmd/ci-runner
          go build -trimpath -ldflags='-H=windowsgui' -o /tmp/ci-runner-controller.exe ./cmd/ci-runner-controller

  go-fuzz:
    name: Go fuzz
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz control request decoding
        id: fuzz_control
        continue-on-error: true
        run: >-
          go test ./internal/control -run='^$'
          -fuzz='^FuzzReadRequest$' -fuzztime=30s
      - name: Fuzz Docker archive validation
        id: fuzz_docker_archive
        continue-on-error: true
        run: >-
          go test ./internal/runtime/docker -run='^$'
          -fuzz='^FuzzReadSingleRegularArchive$' -fuzztime=30s
      - name: Collect newly generated failing inputs
        if: >-
          steps.fuzz_control.outcome == 'failure' ||
          steps.fuzz_docker_archive.outcome == 'failure'
        env:
          FUZZ_FAILURES: ${{ runner.temp }}/go-fuzz-failures
        run: |
          mkdir -p "$FUZZ_FAILURES"
          git ls-files --others --exclude-standard -- \
            internal/control/testdata/fuzz/FuzzReadRequest \
            internal/runtime/docker/testdata/fuzz/FuzzReadSingleRegularArchive \
            | while IFS= read -r file; do
              cp --parents "$file" "$FUZZ_FAILURES"
            done
      - name: Upload minimized failing inputs
        if: >-
          steps.fuzz_control.outcome == 'failure' ||
          steps.fuzz_docker_archive.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-fuzz-failures-${{ github.run_id }}
          path: ${{ runner.temp }}/go-fuzz-failures
          if-no-files-found: ignore
      - name: Report fuzz failures
        if: >-
          always() &&
          (steps.fuzz_control.outcome == 'failure' ||
          steps.fuzz_docker_archive.outcome == 'failure')
        env:
          CONTROL_OUTCOME: ${{ steps.fuzz_control.outcome }}
          DOCKER_ARCHIVE_OUTCOME: ${{ steps.fuzz_docker_archive.outcome }}
        run: |
          echo "Control request fuzz outcome: $CONTROL_OUTCOME"
          echo "Docker archive fuzz outcome: $DOCKER_ARCHIVE_OUTCOME"
          exit 1

  worker-image:
    name: Worker image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install checksum-verified Buildx
        run: bash ./scripts/install-verified-buildx.sh
      - name: Set up pinned BuildKit builder
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
          driver-opts: |
            image=moby/buildkit:v0.31.1@sha256:6b59b7df63a8cb9902736f9ddf7fcff8261613d3e7449b8ea8b7537fc399c03a
          buildkitd-flags: --debug=false
      - name: Build worker image without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: ci-runner-worker:test
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify worker image contract
        run: ./scripts/verify-worker-image.sh ci-runner-worker:test

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  ci-status:
    name: ci-status
    if: always()
    needs:
      - markdown
      - shellcheck
      - shfmt
      - typos
      - editorconfig
      - gitleaks
      - lychee
      - comment-hygiene
      - actionlint
      - jsonschema
      - exec-bit
      - machine-specific-paths
      - eol-renormalize
      - zizmor
      - policy
      - go-quality
      - go-windows-build
      - go-fuzz
      - worker-image
      - dependency-review
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: >-
            ${{ needs.markdown.result }}
            ${{ needs.shellcheck.result }}
            ${{ needs.shfmt.result }}
            ${{ needs.typos.result }}
            ${{ needs.editorconfig.result }}
            ${{ needs.gitleaks.result }}
            ${{ needs.lychee.result }}
            ${{ needs.comment-hygiene.result }}
            ${{ needs.actionlint.result }}
            ${{ needs.jsonschema.result }}
            ${{ needs.exec-bit.result }}
            ${{ needs.machine-specific-paths.result }}
            ${{ needs.eol-renormalize.result }}
            ${{ needs.zizmor.result }}
            ${{ needs.policy.result }}
            ${{ needs.go-quality.result }}
            ${{ needs.go-windows-build.result }}
            ${{ needs.go-fuzz.result }}
            ${{ needs.worker-image.result }}
            ${{ needs.dependency-review.result }}
        run: |
          for result in $RESULTS; do
            case "$result" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $result)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
