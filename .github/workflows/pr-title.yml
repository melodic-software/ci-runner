name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-title:
    permissions:
      pull-requests: read # Reusable semantic-title gate requires no write permission.
    uses: melodic-software/ci-workflows/.github/workflows/semantic-pr.yml@87fb95c3b05fa318b9dd8c2c164cc550071a1ccb # v0.7.0
