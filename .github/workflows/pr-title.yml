name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    permissions:
      pull-requests: read # Reusable semantic-title gate requires no write permission.
    uses: melodic-software/ci-workflows/.github/workflows/semantic-pr.yml@f96ba7b7daae06a31dc3b4cd0757980e6ef3b0fd # 1d3762c 2026-07-10
