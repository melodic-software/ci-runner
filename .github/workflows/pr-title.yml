name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-title:
    permissions:
      pull-requests: read # Reusable semantic-title gate requires no write permission.
    uses: melodic-software/ci-workflows/.github/workflows/semantic-pr.yml@b927829fd0f8888b4dbccccdf7b27596ba453940 # v0.4.0
