name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-title:
    permissions:
      pull-requests: read # Reusable semantic-title gate requires no write permission.
    uses: melodic-software/ci-workflows/.github/workflows/semantic-pr.yml@c36e8810832f27a2715af9422af6e191b0c5df66 # v0.5.0
