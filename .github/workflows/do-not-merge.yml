name: do-not-merge

# Blocks the merge while the PR carries the do-not-merge label. Thin caller of
# the shared do-not-merge-gate reusable; the emitted required-check context is
# `do-not-merge / do-not-merge`. pull_request_target runs the base-branch
# definition (the gate reads label metadata only — no head code runs);
# labeled/unlabeled re-evaluate the gate when the label changes. Public repo:
# runs on the reusable's hosted default runner.
on:
  # zizmor: ignore[dangerous-triggers] metadata-only gate; rationale in the header comment
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  merge_group:

permissions:
  pull-requests: read # the gate only reads the PR's labels to decide pass/fail

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  do-not-merge:
    permissions:
      pull-requests: read # the reusable gate reads the PR's labels only
    uses: melodic-software/ci-workflows/.github/workflows/do-not-merge-gate.yml@87fb95c3b05fa318b9dd8c2c164cc550071a1ccb # v0.7.0
