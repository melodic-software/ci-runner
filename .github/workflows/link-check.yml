name: link-check

on:
  schedule:
    - cron: '37 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    permissions:
      contents: read
      issues: write
    uses: melodic-software/ci-workflows/.github/workflows/link-check.yml@e103a330577206213a4ebc0919029d2533c39cdb # e103a33 2026-07-10
    with:
      args: >-
        --cache
        --max-cache-age 7d
        --no-progress
        --accept-timeouts
        --config lychee.toml
        './**/*.md'
