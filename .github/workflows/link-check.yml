name: link-check

on:
  schedule:
    - cron: '37 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: External links
    permissions:
      contents: read # Reusable checker reads repository Markdown.
      issues: write # Reusable checker maintains the scheduled failure issue.
    uses: melodic-software/ci-workflows/.github/workflows/link-check.yml@90f1c54935203fa31b5b3d1f41531228be2c2b7f # v0.6.1
    with:
      args: >-
        --cache
        --max-cache-age 7d
        --no-progress
        --accept-timeouts
        --config lychee.toml
        './**/*.md'
