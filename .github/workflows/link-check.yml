name: link-check

on:
  schedule:
    - cron: '37 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: External links
    permissions:
      contents: read # Reusable checker reads repository Markdown.
      issues: write # Reusable checker maintains the scheduled failure issue.
    uses: melodic-software/ci-workflows/.github/workflows/link-check.yml@b927829fd0f8888b4dbccccdf7b27596ba453940 # v0.4.0
    with:
      args: >-
        --cache
        --max-cache-age 7d
        --no-progress
        --accept-timeouts
        --config lychee.toml
        './**/*.md'
