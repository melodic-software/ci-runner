name: link-check

on:
  schedule:
    - cron: '37 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: External links
    permissions:
      contents: read # Reusable checker reads repository Markdown.
      issues: write # Reusable checker maintains the scheduled failure issue.
    uses: melodic-software/ci-workflows/.github/workflows/link-check.yml@f96ba7b7daae06a31dc3b4cd0757980e6ef3b0fd # 1d3762c 2026-07-10
    with:
      args: >-
        --cache
        --max-cache-age 7d
        --no-progress
        --accept-timeouts
        --config lychee.toml
        './**/*.md'
