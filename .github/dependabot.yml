version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    labels: ["dependencies"]
    schedule:
      interval: weekly
      time: '05:20'
      timezone: America/New_York
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      actions-scale-set-client:
        patterns:
          - github.com/actions/scaleset
      go-production:
        dependency-type: production
        patterns:
          - '*'
        exclude-patterns:
          - github.com/actions/scaleset

  - package-ecosystem: docker
    directory: /
    labels: ["dependencies"]
    schedule:
      interval: weekly
      time: '05:30'
      timezone: America/New_York
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    ignore:
      # Legacy Compose is retained only until the canary proves the new
      # controller. It must never drive a mutable deployment update.
      - dependency-name: ghcr.io/melodic-software/ci-runner
    groups:
      worker-image:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    labels: ["dependencies"]
    schedule:
      interval: weekly
      time: '05:40'
      timezone: America/New_York
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      github-actions:
        patterns:
          - '*'
