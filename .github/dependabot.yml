version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    labels: ["dependencies"]
    schedule:
      interval: weekly
      time: '05:20'
      timezone: America/New_York
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      actions-scale-set-client:
        patterns:
          - github.com/actions/scaleset
      go-production:
        dependency-type: production
        patterns:
          - '*'
        exclude-patterns:
          - github.com/actions/scaleset

  - package-ecosystem: docker
    directory: /
    labels: ["dependencies"]
    schedule:
      interval: weekly
      time: '05:30'
      timezone: America/New_York
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    groups:
      worker-image:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    labels: ["dependencies"]
    schedule:
      interval: weekly
      time: '05:40'
      timezone: America/New_York
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
    ignore:
      # The runner-policy allowlist pins ci-workflows reusable-workflow refs to
      # independently reviewed SHAs, so a Dependabot bump to an unreviewed main
      # commit can only fail the Runner policy lane. Those pins move through
      # deliberate reviewed PRs after a standards allowlist update. Composite
      # actions (melodic-software/ci-workflows/.github/actions/*) are not
      # SHA-allowlisted and stay Dependabot-managed.
      # Pattern source: melodic-software/standards PR #102.
      - dependency-name: "melodic-software/ci-workflows/.github/workflows/*"
    groups:
      github-actions:
        patterns:
          - '*'
